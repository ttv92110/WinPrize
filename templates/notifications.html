<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - WinPrize</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            margin-right: 20px;
        }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 3px 6px;
            font-size: 0.7rem;
            min-width: 18px;
            text-align: center;
        }
        .notification-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .notification-item:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .notification-item.unread {
            background: #f0f7ff;
            border-left-color: #667eea;
        }
        .notification-item.new-draw {
            border-left-color: #28a745;
        }
        .notification-item.payment-update {
            border-left-color: #ffc107;
        }
        .notification-item.draw-result {
            border-left-color: #17a2b8;
        }
        .notification-time {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .notification-actions {
            margin-top: 15px;
        }
        .mark-read-btn {
            background: transparent;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .mark-read-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-trophy text-warning me-2"></i>
                WinPrize
            </a>
            <div class="navbar-nav ms-auto d-flex align-items-center">
                <div class="notification-bell" onclick="window.location.href='/notifications'">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge">0</span>
                </div>
                <a href="/" class="btn btn-outline-light me-2">
                    <i class="fas fa-home me-2"></i>Home
                </a>
                <div id="userMenu"></div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">
                        <i class="fas fa-bell me-2 text-primary"></i>
                        Notifications
                    </h2>
                    <button class="btn btn-outline-primary" onclick="markAllAsRead()">
                        <i class="fas fa-check-double me-2"></i>Mark All as Read
                    </button>
                </div>
            </div>
        </div>

        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading notifications...</p>
        </div>

        <div id="notificationsContainer" style="display: none;"></div>

        <div id="emptyState" class="text-center py-5" style="display: none;">
            <i class="fas fa-bell-slash fa-4x text-muted mb-3"></i>
            <h3>No Notifications</h3>
            <p class="text-muted">You're all caught up!</p>
            <a href="/#draws" class="btn btn-primary mt-3">Browse Draws</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/app.js"></script>
    <script>
        let currentUser = null;
        let notifications = [];

        document.addEventListener('DOMContentLoaded', function() {
            currentUser = JSON.parse(localStorage.getItem("loggedUser"));
            if (!currentUser) {
                window.location.href = "/";
                return;
            }
            loadNotifications();
            updateNotificationBadge();
            // Check for new notifications every 30 seconds
            setInterval(updateNotificationBadge, 30000);
        });

        async function loadNotifications() {
            try {
                const res = await fetch(`/notifications/${currentUser.email}`);
                const data = await res.json();
                
                document.getElementById('loadingState').style.display = 'none';
                
                if (data.notifications && data.notifications.length > 0) {
                    notifications = data.notifications;
                    displayNotifications(notifications);
                } else {
                    document.getElementById('emptyState').style.display = 'block';
                }
            } catch (error) {
                console.error("Error loading notifications:", error);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').querySelector('h3').textContent = 'Error Loading Notifications';
            }
        }

        function displayNotifications(notifications) {
            const container = document.getElementById('notificationsContainer');
            container.style.display = 'block';
            container.innerHTML = '';

            notifications.forEach(notification => {
                const isUnread = !notification.read;
                const notificationClass = isUnread ? 'unread' : '';
                const typeClass = notification.type === 'new_draw' ? 'new-draw' :
                                 notification.type === 'payment_update' ? 'payment-update' :
                                 notification.type === 'draw_result' ? 'draw-result' : '';
                
                const timeAgo = getTimeAgo(notification.created_at);
                
                const notificationHtml = `
                    <div class="notification-item ${notificationClass} ${typeClass}" id="notification-${notification.id}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="mb-2">${notification.title}</h5>
                                <p class="mb-2">${notification.message}</p>
                                <small class="notification-time">
                                    <i class="far fa-clock me-1"></i>${timeAgo}
                                </small>
                            </div>
                            ${isUnread ? '<span class="badge bg-primary">New</span>' : ''}
                        </div>
                        
                        <div class="notification-actions d-flex justify-content-between align-items-center">
                            <div>
                                ${notification.action_url ? `
                                    <a href="${notification.action_url}" class="btn btn-sm btn-primary">
                                        <i class="fas fa-eye me-1"></i>${notification.action_text}
                                    </a>
                                ` : ''}
                            </div>
                            ${isUnread ? `
                                <button class="mark-read-btn" onclick="markAsRead('${notification.id}')">
                                    <i class="fas fa-check me-1"></i>Mark as Read
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                container.innerHTML += notificationHtml;
            });
        }

        async function markAsRead(notificationId) {
            try {
                const res = await fetch(`/notifications/mark-read/${notificationId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: currentUser.email })
                });
                
                const data = await res.json();
                if (data.success) {
                    const notification = document.getElementById(`notification-${notificationId}`);
                    notification.classList.remove('unread');
                    notification.querySelector('.badge')?.remove();
                    notification.querySelector('.mark-read-btn')?.remove();
                    updateNotificationBadge();
                }
            } catch (error) {
                console.error("Error marking as read:", error);
            }
        }

        async function markAllAsRead() {
            try {
                const res = await fetch(`/notifications/mark-all-read/${currentUser.email}`, {
                    method: "POST"
                });
                
                const data = await res.json();
                if (data.success) {
                    document.querySelectorAll('.notification-item.unread').forEach(item => {
                        item.classList.remove('unread');
                        item.querySelector('.badge')?.remove();
                        item.querySelector('.mark-read-btn')?.remove();
                    });
                    updateNotificationBadge();
                }
            } catch (error) {
                console.error("Error marking all as read:", error);
            }
        }

        async function updateNotificationBadge() {
            try {
                const res = await fetch(`/notifications/count/${currentUser.email}`);
                const data = await res.json();
                const badge = document.getElementById('notificationBadge');
                if (data.unread_count > 0) {
                    badge.textContent = data.unread_count;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch (error) {
                console.error("Error updating badge:", error);
            }
        }

        function getTimeAgo(dateString) {
            try {
                const parts = dateString.match(/(\d+)\/(\d+)\/(\d+)T(\d+)h:(\d+)m:(\d+)s/);
                if (!parts) return dateString;
                
                const [_, day, month, year, hour, minute] = parts;
                const date = new Date(year, month-1, day, hour, minute);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);
                
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
                if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
                return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            } catch {
                return dateString;
            }
        }
    </script>
</body>
</html>
