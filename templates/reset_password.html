            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);

            opacity: 0.6;
            cursor: not-allowed;

<body>
    <div class="reset-card" data-aos="fade-up">
        <div class="reset-header">
            <i class="fas fa-key"></i>
            <h2>Reset Password</h2>
            <p class="text-muted">Create a new password for your account</p>
            <p class="text-info"><i class="fas fa-envelope me-2"></i>{{ email }}</p>
        </div>

        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
        <div id="successAlert" class="alert alert-success" style="display: none;"></div>

        <form id="resetPasswordForm" onsubmit="event.preventDefault(); resetPassword();">
            <input type="hidden" id="token" value="{{ token }}">

            <div class="mb-3">
                <label for="newPassword" class="form-label">
                    <i class="fas fa-lock me-2 text-primary"></i>New Password
                </label>
                <div class="input-group">
                    <input type="password" class="form-control form-control-lg" id="newPassword" 
                           placeholder="Enter new password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword')">
                        <i class="fas fa-eye" id="toggleNewPassword"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">
                    <i class="fas fa-check-circle me-2 text-primary"></i>Confirm Password
                </label>
                <div class="input-group">
                    <input type="password" class="form-control form-control-lg" id="confirmPassword" 
                           placeholder="Confirm new password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                    </button>
                </div>
                <small class="text-danger d-none" id="passwordMismatch">Passwords do not match!</small>
            </div>

            <!-- Password Requirements -->
            <div class="password-requirements">
                <strong>Password Requirements:</strong>
                <ul>
                    <li id="reqLength" class="invalid">
                        <i class="fas fa-times-circle"></i> At least 6 characters
                    </li>
                    <li id="reqMatch" class="invalid">
                        <i class="fas fa-times-circle"></i> Passwords match
                    </li>
                </ul>
            </div>

            <button type="submit" class="btn-reset" id="resetBtn">
                <i class="fas fa-sync-alt me-2"></i>Reset Password
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(`toggle${inputId.charAt(0).toUpperCase() + inputId.slice(1)}`);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Check password requirements
        function checkPasswordRequirements() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            // Length check
            const lengthReq = document.getElementById('reqLength');
            if (password.length >= 6) {
                lengthReq.className = 'valid';
                lengthReq.innerHTML = '<i class="fas fa-check-circle"></i> At least 6 characters';
            } else {
                lengthReq.className = 'invalid';
                lengthReq.innerHTML = '<i class="fas fa-times-circle"></i> At least 6 characters';
            }
            
            // Match check
            const matchReq = document.getElementById('reqMatch');
            const mismatchMsg = document.getElementById('passwordMismatch');
            
            if (password && confirm && password === confirm) {
                matchReq.className = 'valid';
                matchReq.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
                mismatchMsg.classList.add('d-none');
            } else {
                matchReq.className = 'invalid';
                matchReq.innerHTML = '<i class="fas fa-times-circle"></i> Passwords match';
                if (confirm) {
                    mismatchMsg.classList.remove('d-none');
                } else {
                    mismatchMsg.classList.add('d-none');
                }
            }
        }

        document.getElementById('newPassword').addEventListener('input', checkPasswordRequirements);
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordRequirements);

        // Reset password function
        async function resetPassword() {
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (!newPassword || !confirmPassword) {
                showError('Please fill all fields');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';
            
            try {
                const res = await fetch(`/password/reset/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showSuccess(data.message);
                    
                    // Redirect to home after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showError(data.detail || 'Failed to reset password');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Reset Password';
                }
            } catch (error) {
                console.error('Error:', error);
                showError('An error occurred. Please try again.');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Reset Password';
            }
        }

        function showError(message) {
            document.getElementById('errorAlert').style.display = 'block';
            document.getElementById('errorAlert').textContent = message;
            document.getElementById('successAlert').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('errorAlert').style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('successAlert').textContent = message;
            document.getElementById('errorAlert').style.display = 'none';
        }
    </script>
</body>
