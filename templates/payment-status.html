    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }
    .status-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 30px;
      margin-bottom: 30px;
      transition: all 0.3s;
    }
    .status-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.15);
    }
    .status-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    .status-paid {
      background: #d4edda;
      color: #155724;
    }
    .status-cancel {
      background: #f8d7da;
      color: #721c24;
    }
    .badge-pending {
      background: #ffc107;
      color: #000;
    }
    .badge-paid {
      background: #28a745;
      color: white;
    }
    .badge-cancel {
      background: #dc3545;
      color: white;
    }
    .rejection-reason {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    .detail-row {
      border-bottom: 1px solid #dee2e6;
      padding: 12px 0;
    }
    .detail-label {
      font-weight: 600;
      color: #495057;
    }
    .detail-value {
      color: #212529;
    }
    .filter-btn {
      border-radius: 50px;
      padding: 8px 20px;
      margin: 0 5px;
      transition: all 0.3s;
    }
    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 20px;
    }
    .empty-state i {
      font-size: 80px;
      color: #dee2e6;
      margin-bottom: 20px;
    }

   
    @media screen and (max-width: 680px) {
        .status-card {
            padding: 20px !important;
            margin-bottom: 20px !important;
        }
        
        .status-icon {
            width: 50px !important;
            height: 50px !important;
            font-size: 24px !important;
            margin-bottom: 15px !important;
        }
        
        .detail-row {
            padding: 8px 0 !important;
            font-size: 0.9rem !important;
        }
        
        .detail-label {
            font-size: 0.9rem !important;
        }
        
        .detail-value {
            font-size: 0.9rem !important;
        }
        
        .rejection-reason {
            padding: 15px !important;
            margin-top: 15px !important;
        }
        
        .rejection-reason h6 {
            font-size: 1rem !important;
        }
        
        .rejection-reason p {
            font-size: 0.9rem !important;
        }
        
        .filter-btn {
            padding: 6px 12px !important;
            font-size: 0.8rem !important;
            margin: 3px !important;
        }
        
        .empty-state {
            padding: 40px 15px !important;
        }
        
        .empty-state i {
            font-size: 50px !important;
        }
        
        .empty-state h3 {
            font-size: 1.3rem !important;
        }
        
        .empty-state p {
            font-size: 0.9rem !important;
        }
        
        .badge {
            font-size: 0.7rem !important;
            padding: 4px 8px !important;
        }
    }

    /* ٹیبلیٹ (681px سے 890px تک) */
    @media screen and (min-width: 681px) and (max-width: 890px) {
        .status-card {
            padding: 25px !important;
        }
        
        .status-icon {
            width: 60px !important;
            height: 60px !important;
            font-size: 30px !important;
        }
        
        .filter-btn {
            padding: 7px 15px !important;
            font-size: 0.9rem !important;
        }
        
        .detail-row {
            font-size: 0.95rem !important;
        }
    }

    /* بہت چھوٹے موبائل (380px سے کم) */
    @media screen and (max-width: 380px) {
        .status-card {
            padding: 15px !important;
        }
        
        .detail-row {
            flex-direction: column !important;
            text-align: left !important;
        }
        
        .detail-label {
            display: block !important;

        }
        
        .detail-value {

        }

            font-size: 0.7rem !important;

        }
        
        .rejection-reason {

        }
    }

  <div class="container mt-5">
    <div class="row">
      <div class="col-12 text-center mb-4">
        <h1 class="display-4 fw-bold">
          <i class="fas fa-credit-card me-3 text-primary"></i>
          Payment Status
        </h1>

      </div>
    </div>

    <!-- Filter Buttons -->
    <div class="row mb-4">
      <div class="col-12 text-center">
        <button class="btn btn-outline-primary filter-btn active" onclick="filterPayments('all')" id="filterAll">
          <i class="fas fa-list me-2"></i>All
        </button>
        <button class="btn btn-outline-warning filter-btn" onclick="filterPayments('pending')" id="filterPending">
          <i class="fas fa-clock me-2"></i>Pending
        </button>
        <button class="btn btn-outline-success filter-btn" onclick="filterPayments('paid')" id="filterPaid">
          <i class="fas fa-check-circle me-2"></i>Approved
        </button>
        <button class="btn btn-outline-danger filter-btn" onclick="filterPayments('cancel')" id="filterCancel">
          <i class="fas fa-times-circle me-2"></i>Rejected
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="text-center py-5">

    <div id="paymentsContainer" style="display: none;"></div>

    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="../static/js/app.js"></script>
  <script>
    AOS.init();
    let allPayments = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', function() {
      loadPayments();
    });

    async function loadPayments() {
      const user = JSON.parse(localStorage.getItem("loggedUser"));
      if (!user) {
        window.location.href = "/";
        return;
      }

      try {
        const response = await fetch(`/payments/user/${user.email}`);
        const payments = await response.json();

        document.getElementById('loadingState').style.display = 'none';

        if (payments && payments.length > 0) {
          allPayments = payments;
          displayPayments(payments);
        } else {
          document.getElementById('emptyState').style.display = 'block';
        }
      } catch (error) {
        console.error("Error loading payments:", error);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').querySelector('h3').textContent = 'Error Loading Payments';
        document.getElementById('emptyState').querySelector('p').textContent = 'Please try again later.';
      }
    }

    function displayPayments(payments) {
      const container = document.getElementById('paymentsContainer');
      container.style.display = 'block';
      container.innerHTML = '';

      if (payments.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5">
            <i class="fas fa-filter fa-4x text-muted mb-3"></i>
            <h4>No payments in this category</h4>
            <p class="text-muted">Try a different filter</p>
          </div>
        `;
        return;
      }

      payments.forEach(payment => {
        const statusClass = payment.status === 'paid' ? 'status-paid' : 
                           payment.status === 'cancel' ? 'status-cancel' : 'status-pending';
        const badgeClass = payment.status === 'paid' ? 'badge-paid' : 
                          payment.status === 'cancel' ? 'badge-cancel' : 'badge-pending';
        const statusIcon = payment.status === 'paid' ? 'fa-check-circle' : 
                          payment.status === 'cancel' ? 'fa-times-circle' : 'fa-clock';
        const statusText = payment.status === 'paid' ? 'APPROVED' : 
                          payment.status === 'cancel' ? 'REJECTED' : 'PENDING';

        const card = document.createElement('div');
        card.className = 'status-card';
        card.setAttribute('data-status', payment.status);

        let rejectionHtml = '';
        if (payment.status === 'cancel' && (payment.notes || payment.rejection_reason)) {
          const reason = payment.notes || payment.rejection_reason || 'No reason provided';
          rejectionHtml = `
            <div class="rejection-reason">
              <h6 class="mb-2"><i class="fas fa-exclamation-triangle me-2"></i>Rejection Reason:</h6>
              <p class="mb-0">${reason}</p>
            </div>
          `;
        }

        if (payment.status === 'paid' && payment.notes) {
          rejectionHtml = `
            <div class="alert alert-success mt-3">
              <i class="fas fa-check-circle me-2"></i>
              ${payment.notes}
            </div>
          `;
        }

        card.innerHTML = `
          <div class="row">
            <div class="col-md-2 text-center">
              <div class="status-icon ${statusClass} mx-auto">
                <i class="fas ${statusIcon}"></i>
              </div>
              <span class="badge ${badgeClass} mt-2 p-2">${statusText}</span>
            </div>
            <div class="col-md-10">
              <h4 class="mb-3">${payment.lucky_draw_title}</h4>
              
              <div class="row">
                <div class="col-md-6">
                  <div class="detail-row">
                    <span class="detail-label">Amount Paid:</span>
                    <span class="detail-value float-end fw-bold text-success">Rs. ${payment.amount}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Transaction ID:</span>
                    <span class="detail-value float-end">${payment.transaction_id}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value float-end">${formatDate(payment.created_at)}</span>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="detail-row">
                    <span class="detail-label">From Bank:</span>
                    <span class="detail-value float-end">${payment.account_bank_from}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">From Account:</span>
                    <span class="detail-value float-end">${maskAccount(payment.account_number_from)}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">To Bank:</span>
                    <span class="detail-value float-end">${payment.account_bank_to}</span>
                  </div>
                </div>
              </div>

              ${rejectionHtml}

              ${payment.updated_at ? `
                <div class="text-muted small mt-2">
                  <i class="fas fa-clock me-1"></i>
                  Last updated: ${formatDate(payment.updated_at)}
                </div>
              ` : ''}
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function filterPayments(status) {
      currentFilter = status;
      
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`filter${status.charAt(0).toUpperCase() + status.slice(1)}`).classList.add('active');

      if (status === 'all') {
        displayPayments(allPayments);
      } else {
        const filtered = allPayments.filter(p => p.status === status);
        displayPayments(filtered);
      }
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      try {
        const parts = dateString.match(/(\d+)\/(\d+)\/(\d+)T(\d+)h:(\d+)m:(\d+)s/);
        if (parts) {
          const [_, day, month, year, hour, minute] = parts;
          return `${day}/${month}/${year} ${hour}:${minute}`;
        }
      } catch (e) {
        console.error("Error formatting date:", e);
      }
      return dateString;
    }

    function maskAccount(account) {
      if (!account) return 'N/A';
      if (account.length <= 8) return '****' + account.slice(-4);
      return '****' + account.slice(-4);
    }

    function viewPaymentStatus() {
      window.location.href = "/payment-status";
    }
  </script>
